<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Angelica - Agente Virtual</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        #video-wrapper { width: 350px; height: 350px; margin: 0 auto; border-radius: 50%; border: 4px solid #007bff; overflow: hidden; background: #000; box-shadow: 0 0 20px #007bff; }
        video { width: 100%; height: 100%; object-fit: cover; }
        button { padding: 15px 30px; margin: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-on { background: #28a745; color: white; }
        .btn-talk { background: #007bff; color: white; }
        #status { color: #00ff00; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Agente Virtual: Angelica</h1>
    <div id="video-wrapper">
        <video id="avatarVideo" autoplay playsinline></video>
    </div>
    
    <br>
    <button class="btn-on" onclick="connect()">1. Ligar Angelica</button>
    <button class="btn-talk" id="talkBtn" onclick="startTalking()" disabled>2. Conversar</button>
    
    <div id="status">Status: Desconectada</div>

    <script>
        const AGENT_ID = "v2_agt_L7Kz9jzF";
        const CLIENT_KEY = "Z29vZ2xlLW9hdXRoMnw1MDEwRjE2NjQwNTk3MTQxODc2NDExNDY2SUt3bTJKV3pxZmVSe3lldDk4UjdkbA==";

        let pc, streamId, sessionId;

        async function connect() {
            document.getElementById('status').innerText = "Conectando...";
            try {
                const response = await fetch(`https://api.d-id.com/agents/${AGENT_ID}/streams`, {
                    method: "POST",
                    headers: { 
                        "Authorization": "Basic " + CLIENT_KEY,
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    const errorDetail = await response.json();
                    throw new Error(errorDetail.description || "Erro na API");
                }

                const data = await response.json();
                streamId = data.id; 
                sessionId = data.session_id;

                pc = new RTCPeerConnection({ iceServers: data.ice_servers });
                
                pc.ontrack = (event) => {
                    document.getElementById('avatarVideo').srcObject = event.streams[0];
                    document.getElementById('status').innerText = "Angelica Online!";
                    document.getElementById('talkBtn').disabled = false;
                };

                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                await fetch(`https://api.d-id.com/agents/${AGENT_ID}/streams/${streamId}/sdp`, {
                    method: "POST",
                    headers: { 
                        "Authorization": "Basic " + CLIENT_KEY,
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ answer, session_id: sessionId })
                });

            } catch (err) {
                document.getElementById('status').innerText = "Erro: " + err.message;
                console.error(err);
            }
        }

        async function startTalking() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('status').innerText = "Você: " + text;

                try {
                    const res = await fetch('https://tammie-snarly-petrina.ngrok-free.dev/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ message: text })
                    });
                    const gpt = await res.json();

                    await fetch(`https://api.d-id.com/agents/${AGENT_ID}/streams/${streamId}`, {
                        method: "POST",
                        headers: { 
                            "Authorization": "Basic " + CLIENT_KEY,
                            "Content-Type": "application/json" 
                        },
                        body: JSON.stringify({
                            script: { 
                                type: "text", 
                                input: gpt.response, 
                                provider: { type: "microsoft", voice_id: "pt-BR-FranciscaNeural" } 
                            },
                            session_id: sessionId
                        })
                    });
                } catch (e) {
                    document.getElementById('status').innerText = "Erro ao processar fala.";
                }
            };
            recognition.start();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Angelica - Avatar com Memória</title>
    <style>
        body {
            background: #121212;
            color: white;
            text-align: center;
            font-family: sans-serif;
            padding-top: 50px;
        }

        #video-wrapper {
            width: 350px;
            height: 350px;
            margin: 0 auto;
            border-radius: 50%;
            border: 4px solid #007bff;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 20px #007bff;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button {
            padding: 15px 30px;
            margin: 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-on {
            background: #28a745;
            color: white;
        }

        .btn-talk {
            background: #007bff;
            color: white;
        }

        .btn-send {
            background: #ff9800;
            color: white;
            margin-left: 8px;
            padding: 13px 18px;
        }

        #status {
            color: #00ff00;
            margin-top: 20px;
            font-weight: bold;
            background: #222;
            padding: 10px;
            display: inline-block;
            border-radius: 5px;
            min-width: 280px;
        }

        #text-wrapper {
            margin-top: 20px;
        }

        #textInput {
            width: 320px;
            max-width: 80vw;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #444;
            outline: none;
            font-size: 16px;
            background: #1d1d1d;
            color: white;
        }

        #textInput::placeholder {
            color: #999;
        }
    </style>
</head>
<body>
    <h1>Agente Virtual: Angelica</h1>

    <div id="video-wrapper">
        <video id="agent-video" autoplay playsinline></video>
    </div>

    <br>

    <button class="btn-on" id="btnConnect">1. Ligar Angelica</button>
    <button class="btn-talk" id="btnTalk">2. Conversar</button>

    <div id="text-wrapper">
        <input
            type="text"
            id="textInput"
            placeholder="Digite aqui sua mensagem ou a placa do veículo"
        />
        <button class="btn-send" id="btnSendText">Enviar texto</button>
    </div>

    <div style="margin-top: 20px;">
        <div id="status">Status: Aguardando comando...</div>
    </div>

    <script type="module">
        import * as did from "https://cdn.jsdelivr.net/npm/@d-id/client-sdk/+esm";

        // =========================
        // CONFIG D-ID
        // =========================
        const agentId = "v2_agt_L7Kz9jzF";
        const auth = {
            type: "key",
            clientKey: "Z29vZ2xlLW9hdXRoMnwxMDE1NjQwNTk3MTQxODc2NDEwNDY6SUt3bTJJV3JxZmVSQ3lldDY4Ujdl"
        };

        // =========================
        // CONFIG BACKEND
        // =========================
        const backendUrl = "https://tammie-snarly-petrina.ngrok-free.dev/chat";

        const videoElement = document.getElementById("agent-video");
        const statusLabel = document.getElementById("status");
        const textInput = document.getElementById("textInput");
        const btnSendText = document.getElementById("btnSendText");
        const btnTalk = document.getElementById("btnTalk");

        let agent = null;
        let srcObject = null;
        let isSpeaking = false;
        let isSending = false;
        let isConnecting = false;

        const callbacks = {
            onSrcObjectReady(value) {
                console.log("Mídia pronta:", value);
                srcObject = value;
                videoElement.srcObject = value;
                statusLabel.innerText = "ANGELICA ONLINE!";
            },

            onConnectionStateChange(state) {
                console.log("Estado da conexão:", state);
                statusLabel.innerText = "Conexão: " + state;
            },

            onVideoStateChange(state) {
                console.log("Estado do vídeo:", state);

                if (state === "STOP" && agent?.agent?.presenter?.idle_video) {
                    videoElement.srcObject = undefined;
                    videoElement.src = agent.agent.presenter.idle_video;
                } else if (srcObject) {
                    videoElement.src = "";
                    videoElement.srcObject = srcObject;
                }
            },

            onError(error, errorData) {
                console.error("ERRO D-ID:", error, errorData);
                statusLabel.innerText = "ERRO D-ID: " + (error?.message || error || "desconhecido");
            }
        };

        function isSessionError(err) {
            const txt = String(err?.message || err || "").toLowerCase();
            return txt.includes("missing or invalid session_id") || txt.includes("sessionerror");
        }

        async function initAgent(forceNew = false) {
            if (forceNew) {
                try {
                    if (agent && typeof agent.disconnect === "function") {
                        await agent.disconnect();
                    }
                } catch (e) {
                    console.warn("Falha ao desconectar agente antigo:", e);
                }
                agent = null;
                srcObject = null;
            }

            if (!agent) {
                agent = await did.createAgentManager(agentId, {
                    auth,
                    callbacks,
                    streamOptions: {
                        compatibilityMode: "auto",
                        streamWarmup: true
                    }
                });
            }

            return agent;
        }

        async function ensureConnected(forceReconnect = false) {
            if (isConnecting) return agent;

            isConnecting = true;
            try {
                const a = await initAgent(forceReconnect);
                await a.connect();
                return a;
            } finally {
                isConnecting = false;
            }
        }

        async function reconnectAgent() {
            statusLabel.innerText = "Reconectando sessão da Angélica...";
            return await ensureConnected(true);
        }

        async function falarResposta(texto) {
            let ultimaFalha = null;

            for (let tentativa = 1; tentativa <= 2; tentativa++) {
                try {
                    const a = await ensureConnected(tentativa > 1);
                    isSpeaking = true;

                    if (typeof a.speak === "function") {
                        await a.speak({
                            type: "text",
                            input: texto
                        });
                    } else {
                        await a.chat(texto);
                    }

                    isSpeaking = false;
                    return;
                } catch (err) {
                    ultimaFalha = err;
                    isSpeaking = false;
                    console.error("Erro ao falar resposta:", err);

                    if (isSessionError(err) && tentativa < 2) {
                        await reconnectAgent();
                        continue;
                    }

                    throw err;
                }
            }

            throw ultimaFalha;
        }

        async function enviarMensagem(message) {
            const text = (message || "").trim();
            if (!text || isSending) return;

            isSending = true;

            try {
                statusLabel.innerText = "Você: " + text;

                const res = await fetch(backendUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: text })
                });

                if (!res.ok) {
                    throw new Error("Backend respondeu HTTP " + res.status);
                }

                const gpt = await res.json();
                console.log("Resposta do backend:", gpt);

                if (!gpt.response) {
                    throw new Error("Backend não retornou 'response'");
                }

                statusLabel.innerText = "Angélica está respondendo...";
                await falarResposta(gpt.response);
                statusLabel.innerText = "Pronta para a próxima pergunta.";
                textInput.value = "";
            } catch (e) {
                console.error("Erro no backend:", e);
                statusLabel.innerText = "Erro no servidor local: " + (e?.message || e);
            } finally {
                isSending = false;
            }
        }

        document.getElementById("btnConnect").addEventListener("click", async () => {
            try {
                statusLabel.innerText = "Conectando...";
                await ensureConnected(false);
                statusLabel.innerText = "Conectada com sucesso.";
            } catch (err) {
                console.error("Falha fatal:", err);
                statusLabel.innerText = "FALHA TÉCNICA: " + (err?.message || "Erro de conexão");
            }
        });

        btnTalk.addEventListener("click", async () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                statusLabel.innerText = "Seu navegador não suporta reconhecimento de voz.";
                return;
            }

            if (isSpeaking || isSending) {
                statusLabel.innerText = "Aguarde a Angélica terminar para falar novamente.";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = "pt-BR";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            recognition.onstart = () => {
                statusLabel.innerText = "Estou ouvindo...";
            };

            recognition.onerror = (event) => {
                console.error("Erro no reconhecimento de voz:", event);
                statusLabel.innerText = "Erro no microfone: " + event.error;
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                await enviarMensagem(text);
            };

            recognition.start();
        });

        btnSendText.addEventListener("click", async () => {
            await enviarMensagem(textInput.value);
        });

        textInput.addEventListener("keydown", async (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                await enviarMensagem(textInput.value);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Angélica RS Motors</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #0b141a;
            color: #e9edef;
            font-family: Arial, sans-serif;
        }

        .app {
            max-width: 460px;
            margin: 0 auto;
            min-height: 100vh;
            background: #111b21;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #202c33;
            border-right: 1px solid #202c33;
        }

        .topbar {
            background: #202c33;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid #2a3942;
        }

        .avatar-mini {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #00a884;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
        }

        .avatar-mini video,
        .avatar-big video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.22);
            transform-origin: center 34%;
        }

        .topbar-info {
            flex: 1;
            min-width: 0;
        }

        .topbar-title {
            font-size: 17px;
            font-weight: bold;
            color: #e9edef;
        }

        .topbar-status {
            font-size: 12px;
            color: #8696a0;
            margin-top: 2px;
        }

        .icon-btn {
            background: #2a3942;
            color: #e9edef;
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .hero {
            background: linear-gradient(180deg, #111b21 0%, #0b141a 100%);
            padding: 18px 16px 12px;
            border-bottom: 1px solid #202c33;
        }

        .avatar-big-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        .avatar-big {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid #007bff;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 20px #007bff;
        }

        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .controls button {
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-on {
            background: #00a884;
            color: white;
        }

        .btn-on.connected {
            background: #dc3545;
        }

        .btn-talk {
            background: #007bff;
            color: white;
        }

        .messages {
            flex: 1;
            padding: 14px 12px 90px;
            background:
                linear-gradient(rgba(11,20,26,0.92), rgba(11,20,26,0.92)),
                radial-gradient(circle at top left, rgba(0,168,132,0.08), transparent 30%);
            overflow-y: auto;
        }

        .message-row {
            display: flex;
            margin-bottom: 10px;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 10px;
            line-height: 1.45;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
            position: relative;
        }

        .bubble.user {
            background: #005c4b;
            color: #e9edef;
            border-top-right-radius: 4px;
        }

        .bubble.bot {
            background: #202c33;
            color: #e9edef;
            border-top-left-radius: 4px;
        }

        .meta {
            display: block;
            font-size: 11px;
            color: #8696a0;
            margin-top: 6px;
        }

        .bubble a {
            color: #53bdeb;
            text-decoration: none;
            font-weight: bold;
        }

        .vehicle-list {
            margin-top: 4px;
            display: grid;
            gap: 4px;
        }

        .vehicle-card {
            background: #1f2c33;
            border: 1px solid #2a3942;
            border-radius: 10px;
            padding: 6px 8px;
        }

        .vehicle-title {
            font-weight: bold;
            color: #e9edef;
            margin-bottom: 2px;
            font-size: 14px;
            line-height: 1.18;
        }

        .vehicle-line {
            font-size: 13px;
            color: #cfd6db;
            margin: 0;
            line-height: 1.18;
        }

        .vehicle-link {
            margin-top: 4px;
            display: inline-block;
            background: #00a884;
            color: white !important;
            padding: 6px 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            line-height: 1.1;
        }

        .composer {
            position: sticky;
            bottom: 0;
            background: #202c33;
            border-top: 1px solid #2a3942;
            padding: 10px;
        }

        .composer-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #textInput {
            flex: 1;
            border: none;
            outline: none;
            border-radius: 999px;
            padding: 13px 16px;
            background: #2a3942;
            color: white;
            font-size: 15px;
        }

        #textInput::placeholder {
            color: #8696a0;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            min-width: 44px;
            border: none;
            border-radius: 50%;
            background: #00a884;
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .btn-send:hover {
            filter: brightness(1.05);
        }

        .status-inline {
            text-align: center;
            font-size: 12px;
            color: #8696a0;
            margin-top: 8px;
            min-height: 16px;
        }

        @media (max-width: 520px) {
            .app {
                max-width: 100%;
                border: none;
            }

            .avatar-big {
                width: 190px;
                height: 190px;
            }

            .vehicle-list {
                gap: 3px;
                margin-top: 3px;
            }

            .vehicle-card {
                padding: 6px 7px;
            }

            .vehicle-title {
                margin-bottom: 1px;
                line-height: 1.15;
            }

            .vehicle-line {
                line-height: 1.15;
            }

            .vehicle-link {
                margin-top: 3px;
                padding: 6px 9px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="avatar-mini">
                <video id="agent-video-mini" autoplay playsinline muted></video>
            </div>

            <div class="topbar-info">
                <div class="topbar-title">Angélica</div>
                <div class="topbar-status" id="headerStatus">Aguardando conexão</div>
            </div>

            <button class="icon-btn" id="btnMute">Som ligado</button>
        </div>

        <div class="hero">
            <div class="avatar-big-wrapper">
                <div class="avatar-big">
                    <video id="agent-video" autoplay playsinline></video>
                </div>
            </div>

            <div class="controls">
                <button class="btn-on" id="btnConnect">1. Ligar Angélica</button>
                <button class="btn-talk" id="btnTalk">2. Conversar</button>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="composer">
            <div class="composer-row">
                <input
                    type="text"
                    id="textInput"
                    placeholder="Digite sua mensagem ou a placa do veículo"
                />
                <button class="btn-send" id="btnSendText" aria-label="Enviar">➤</button>
            </div>
            <div class="status-inline" id="status">Status: Aguardando comando...</div>
        </div>
    </div>

    <script type="module">
        import * as did from "https://cdn.jsdelivr.net/npm/@d-id/client-sdk/+esm";

        const agentId = "v2_agt_L7Kz9jzF";
        const auth = {
            type: "key",
            clientKey: "Z29vZ2xlLW9hdXRoMnwxMDE1NjQwNTk3MTQxODc2NDEwNDY6SUt3bTJJV3JxZmVSQ3lldDY4Ujdl"
        };

        const backendUrl = "https://tammie-snarly-petrina.ngrok-free.dev/chat";

        const videoElement = document.getElementById("agent-video");
        const videoMini = document.getElementById("agent-video-mini");
        const statusLabel = document.getElementById("status");
        const headerStatus = document.getElementById("headerStatus");
        const textInput = document.getElementById("textInput");
        const btnSendText = document.getElementById("btnSendText");
        const btnTalk = document.getElementById("btnTalk");
        const btnConnect = document.getElementById("btnConnect");
        const btnMute = document.getElementById("btnMute");
        const messages = document.getElementById("messages");

        let agent = null;
        let srcObject = null;
        let isSpeaking = false;
        let isSending = false;
        let isConnecting = false;
        let isConnected = false;
        let isMuted = false;

        function updateConnectButton() {
            if (isConnected) {
                btnConnect.textContent = "Desligar";
                btnConnect.classList.add("connected");
            } else {
                btnConnect.textContent = "1. Ligar Angélica";
                btnConnect.classList.remove("connected");
            }
        }

        function setStatus(text) {
            statusLabel.innerText = "Status: " + text;
            headerStatus.innerText = text;
        }

        function formatTime() {
            const now = new Date();
            return now.toLocaleTimeString("pt-BR", {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function escapeHtml(str) {
            return String(str || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function linkifyText(text) {
            const escaped = escapeHtml(text);
            return escaped.replace(
                /(https?:\/\/[^\s]+)/g,
                '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
            );
        }

        function addMessage(role, text, vehicles = []) {
            const row = document.createElement("div");
            row.className = "message-row " + (role === "user" ? "user" : "bot");

            const bubble = document.createElement("div");
            bubble.className = "bubble " + (role === "user" ? "user" : "bot");

            bubble.innerHTML = linkifyText(text);

            if (role === "bot" && Array.isArray(vehicles) && vehicles.length > 0) {
                const list = document.createElement("div");
                list.className = "vehicle-list";

                vehicles.forEach((v) => {
                    const card = document.createElement("div");
                    card.className = "vehicle-card";

                    card.innerHTML = `
                        <div class="vehicle-title">${escapeHtml(v.nome || v.titulo || "Veículo")}</div>
                        ${v.ano ? `<div class="vehicle-line">Ano: ${escapeHtml(v.ano)}</div>` : ""}
                        ${v.preco ? `<div class="vehicle-line">Preço: ${escapeHtml(v.preco)}</div>` : ""}
                        ${v.km ? `<div class="vehicle-line">KM: ${escapeHtml(v.km)}</div>` : ""}
                        ${v.cambio ? `<div class="vehicle-line">Câmbio: ${escapeHtml(v.cambio)}</div>` : ""}
                        ${v.combustivel ? `<div class="vehicle-line">Combustível: ${escapeHtml(v.combustivel)}</div>` : ""}
                        ${v.link ? `<a class="vehicle-link" href="${v.link}" target="_blank" rel="noopener noreferrer">Ver veículo</a>` : ""}
                    `;

                    list.appendChild(card);
                });

                bubble.appendChild(list);
            }

            const meta = document.createElement("span");
            meta.className = "meta";
            meta.textContent = formatTime();

            bubble.appendChild(meta);
            row.appendChild(bubble);
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
        }

        const callbacks = {
            onSrcObjectReady(value) {
                console.log("Mídia pronta:", value);
                srcObject = value;

                videoElement.srcObject = value;
                videoMini.srcObject = value;
            },

            onConnectionStateChange(state) {
                console.log("Estado da conexão:", state);

                const s = String(state || "").toLowerCase();
                isConnected = (
                    s.includes("connected") ||
                    s.includes("open") ||
                    s.includes("streaming")
                );

                updateConnectButton();
                setStatus("Conexão: " + state);
            },

            onVideoStateChange(state) {
                console.log("Estado do vídeo:", state);

                if (state === "STOP" && agent?.agent?.presenter?.idle_video) {
                    videoElement.srcObject = undefined;
                    videoMini.srcObject = undefined;

                    videoElement.src = agent.agent.presenter.idle_video;
                    videoMini.src = agent.agent.presenter.idle_video;
                } else if (srcObject) {
                    videoElement.src = "";
                    videoMini.src = "";

                    videoElement.srcObject = srcObject;
                    videoMini.srcObject = srcObject;
                }
            },

            onError(error, errorData) {
                console.error("ERRO D-ID:", error, errorData);
                setStatus("ERRO D-ID: " + (error?.message || error || "desconhecido"));
            }
        };

        function isSessionError(err) {
            const txt = String(err?.message || err || "").toLowerCase();
            return txt.includes("missing or invalid session_id") || txt.includes("sessionerror");
        }

        async function initAgent() {
            if (!agent) {
                agent = await did.createAgentManager(agentId, {
                    auth,
                    callbacks,
                    streamOptions: {
                        compatibilityMode: "auto",
                        streamWarmup: true
                    }
                });
            }
            return agent;
        }

        async function connectAgent() {
            if (isConnecting) return;
            isConnecting = true;

            try {
                setStatus("Conectando...");
                const a = await initAgent();
                await a.connect();
                isConnected = true;
                updateConnectButton();
                setStatus("Conectada com sucesso");
            } catch (err) {
                console.error("Falha ao conectar:", err);
                isConnected = false;
                updateConnectButton();
                setStatus("Falha técnica: " + (err?.message || "Erro de conexão"));
                throw err;
            } finally {
                isConnecting = false;
            }
        }

        async function disconnectAgent() {
            try {
                if (agent && typeof agent.disconnect === "function") {
                    await agent.disconnect();
                }
            } catch (err) {
                console.warn("Erro ao desligar agente:", err);
            }

            isConnected = false;
            isSpeaking = false;
            updateConnectButton();
            setStatus("Angélica desligada");
        }

        async function reconnectAgentAfterSessionError() {
            try {
                setStatus("Reconectando sessão da Angélica...");

                if (!agent) {
                    await connectAgent();
                    return;
                }

                try {
                    if (typeof agent.disconnect === "function") {
                        await agent.disconnect();
                    }
                } catch (e) {
                    console.warn("Falha ao desconectar sessão antiga:", e);
                }

                isConnected = false;
                updateConnectButton();

                await agent.connect();

                isConnected = true;
                updateConnectButton();
                setStatus("Sessão restabelecida");
            } catch (err) {
                console.error("Falha na reconexão:", err);
                isConnected = false;
                updateConnectButton();
                setStatus("Erro ao reconectar a sessão");
                throw err;
            }
        }

        async function garantirConexaoSePrecisar() {
            if (isConnected) return;
            await connectAgent();
        }

        async function falarResposta(texto) {
            await garantirConexaoSePrecisar();

            if (!agent || !isConnected) {
                throw new Error("Avatar não conectado. Clique em Ligar Angélica primeiro.");
            }

            if (isMuted) {
                return;
            }

            let ultimaFalha = null;

            for (let tentativa = 1; tentativa <= 2; tentativa++) {
                try {
                    isSpeaking = true;

                    if (typeof agent.speak === "function") {
                        await agent.speak({
                            type: "text",
                            input: texto
                        });
                    } else {
                        await agent.chat(texto);
                    }

                    isSpeaking = false;
                    return;
                } catch (err) {
                    ultimaFalha = err;
                    isSpeaking = false;
                    console.error("Erro ao falar resposta:", err);

                    if (isSessionError(err) && tentativa < 2) {
                        await reconnectAgentAfterSessionError();
                        continue;
                    }

                    throw err;
                }
            }

            throw ultimaFalha;
        }

        async function enviarMensagem(message) {
            const text = (message || "").trim();
            if (!text || isSending) return;

            await garantirConexaoSePrecisar();

            if (!agent || !isConnected) {
                setStatus("Clique em Ligar Angélica antes de conversar");
                return;
            }

            isSending = true;
            addMessage("user", text);

            try {
                setStatus("Enviando pergunta...");

                const res = await fetch(backendUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: text })
                });

                if (!res.ok) {
                    throw new Error("Backend respondeu HTTP " + res.status);
                }

                const gpt = await res.json();
                console.log("Resposta do backend:", gpt);

                if (!gpt.response) {
                    throw new Error("Backend não retornou 'response'");
                }

                addMessage("bot", gpt.response, gpt.vehicles || []);

                if (isMuted) {
                    setStatus("Resposta recebida em texto. Som desligado.");
                } else {
                    setStatus("Angélica está respondendo...");
                    await falarResposta(gpt.response);
                    setStatus("Pronta para a próxima pergunta");
                }

                textInput.value = "";
            } catch (e) {
                console.error("Erro no backend:", e);
                setStatus("Erro no servidor local: " + (e?.message || e));
                addMessage("bot", "Desculpe, tive um problema agora.");
            } finally {
                isSending = false;
                isSpeaking = false;
            }
        }

        btnConnect.addEventListener("click", async () => {
            try {
                if (isConnected) {
                    await disconnectAgent();
                } else {
                    await connectAgent();
                }
            } catch (err) {
                console.error("Falha fatal:", err);
            }
        });

        btnTalk.addEventListener("click", async () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                setStatus("Seu navegador não suporta reconhecimento de voz");
                return;
            }

            await garantirConexaoSePrecisar();

            if (!agent || !isConnected) {
                setStatus("Clique em Ligar Angélica antes de conversar");
                return;
            }

            if (isSpeaking || isSending) {
                setStatus("Aguarde a Angélica terminar para falar novamente");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = "pt-BR";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            recognition.onstart = () => {
                setStatus("Estou ouvindo...");
            };

            recognition.onerror = (event) => {
                console.error("Erro no reconhecimento de voz:", event);
                setStatus("Erro no microfone: " + event.error);
            };

            recognition.onend = () => {
                if (!isSending && !isSpeaking) {
                    setStatus("Pronta para a próxima pergunta");
                }
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                await enviarMensagem(text);
            };

            recognition.start();
        });

        btnSendText.addEventListener("click", async () => {
            await enviarMensagem(textInput.value);
        });

        textInput.addEventListener("keydown", async (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                await enviarMensagem(textInput.value);
            }
        });

        btnMute.addEventListener("click", () => {
            isMuted = !isMuted;
            btnMute.textContent = isMuted ? "Som desligado" : "Som ligado";
            setStatus(isMuted ? "Modo silencioso ativado" : "Som ativado");
        });

        updateConnectButton();
    </script>
</body>
</html>

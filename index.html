<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Angelica - SDK Oficial</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        #video-wrapper { width: 350px; height: 350px; margin: 0 auto; border-radius: 50%; border: 4px solid #007bff; overflow: hidden; background: #000; box-shadow: 0 0 20px #007bff; }
        video { width: 100%; height: 100%; object-fit: cover; }
        button { padding: 15px 30px; margin: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-on { background: #28a745; color: white; }
        .btn-talk { background: #007bff; color: white; }
        #status { color: #00ff00; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Agente Virtual: Angelica</h1>
    <div id="video-wrapper">
        <video id="agent-video" autoplay playsinline></video>
    </div>
    <br>
    <button class="btn-on" id="btnConnect">1. Ligar Angelica</button>
    <button class="btn-talk" id="btnTalk">2. Conversar</button>
    <div id="status">Status: Desconectada</div>

    <script type="module">
        import * as did from "https://cdn.jsdelivr.net/npm/@d-id/client-sdk/+esm";

        const agentId = "v2_agt_L7Kz9jzF";
        const auth = {
            type: "key",
            clientKey: "Z29vZ2xlLW9hdXRoMnwxMDE1NjQwNTk3MTQxODc2NDEwNDY6SUt3bTJJV3pxZmVSQ3lldDY4Ujdl"
        };

        const videoElement = document.getElementById("agent-video");
        const statusLabel = document.getElementById("status");
        let agent = null;

        const callbacks = {
            onSrcObjectReady(value) {
                videoElement.srcObject = value;
                statusLabel.innerText = "Angelica Online!";
            },
            onConnectionStateChange(state) {
                statusLabel.innerText = "Status: " + state;
            },
            onError(error, errorData) {
                console.error("D-ID ERROR:", error, errorData);
                statusLabel.innerText = "Erro: " + error;
            }
        };

        async function initAgent() {
            if (!agent) {
                agent = await did.createAgentManager(agentId, { auth, callbacks });
            }
            return agent;
        }

        document.getElementById("btnConnect").addEventListener("click", async () => {
            try {
                statusLabel.innerText = "Conectando via SDK...";
                const a = await initAgent();
                await a.connect();
            } catch (err) {
                statusLabel.innerText = "Erro ao conectar: " + err.message;
            }
        });

        document.getElementById("btnTalk").addEventListener("click", async () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                statusLabel.innerText = "Você disse: " + text;

                try {
                    // Chama seu Python local via ngrok
                    const res = await fetch('https://tammie-snarly-petrina.ngrok-free.dev/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ message: text })
                    });
                    const gpt = await res.json();

                    // Faz a Angelica falar a resposta do seu Python
                    const a = await initAgent();
                    await a.chat(gpt.response);
                    statusLabel.innerText = "Angelica respondendo...";
                } catch (e) {
                    statusLabel.innerText = "Erro ao falar com servidor local.";
                }
            };
            recognition.start();
        });
    </script>
</body>
</html>
